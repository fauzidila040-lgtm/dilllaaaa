<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodataku - Dilla Fauziatu Zahra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Dasar & Video Background */
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: skyblue;
            color: #fff;
            overflow-x: hidden;
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
            filter: brightness(50%);
        }

        /* Navigasi */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 60px;
            background: skyblue;
            color: #000;
        }

        .navbar {
            background-color: blue;
            padding: 15px 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
            padding: 0;
        }

        .navbar ul li {
            color: white;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .navbar ul li:hover { 
            color: darkblue; 
            transform: scale(1.1); 
        }

        /* Konten */
        .main {
            display: flex;
            justify-content: space-between;
            padding: 60px;
            align-items: center;
            min-height: 70vh;
        }

        .text-section { 
            width: 55%; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7); 
        }

        .text-section h1 { 
            font-size: 3.5em; 
            color: aliceblue; 
            margin-bottom: 10px; 
        }

        .text-section span { 
            color: white; 
            font-size: 0.5em; 
            display: block; 
        }

        .image-section { 
            width: 30%; 
        }

        .image-section img {
            width: 100%;
            border: 5px solid steelblue;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.5s;
        }

        .image-section img:hover { 
            transform: rotate(3deg) scale(1.05); 
        }

        .content-section {
            display: none;
            padding: 50px 60px;
            background: rgba(0, 0, 0, 0.7);
            margin: 20px 60px;
            border-radius: 20px;
            border: 1px solid slateblue;
        }

        /* Card Style untuk Pendidikan & Hobi */
        .box-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { 
            background: rgba(255, 182, 193, 0.3); 
            transform: translateY(-10px); 
        }

        .card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 2px solid pink;
            cursor: pointer;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: pink;
            font-size: 14px;
            margin-top: 50px;
        }

        /* Efek Bunga Jatuh */
        .flower {
            position: fixed;
            top: -50px;
            z-index: 999;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

            display*
